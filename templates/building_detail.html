{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 class="neon-heading-cyan">🏢 {{ building.name }}</h2>
  <a class="btn neon-purple" href="{{ url_for('edit_building', bid=building.id) }}">🛠 Edit Building</a>
  <a class="btn neon-green" href="{{ url_for('dashboard') }}">⬅ Back to Dashboard</a>

  <h3 class="neon-yellow">Units</h3>
  <ul class="receipt-list">
    {% for unit in building.units %}
      <li class="receipt-item">
        <span class="neon-blue">Unit {{ unit.number }}</span>
        <span class="neon-pink">Rent: {{ unit.rent_amount }}</span>
        <a class="btn neon-orange" href="{{ url_for('edit_unit', uid=unit.id) }}">🛠 Edit Unit</a>
        <a class="btn neon-cyan" href="{{ url_for('unit_detail', uid=unit.id) }}">📖 View Unit</a>
      </li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
