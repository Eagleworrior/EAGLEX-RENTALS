{% extends "base.html" %}
{% block content %}
<div style="padding: 25px; max-width: 650px; margin: auto;">

    <h1 style="font-size: 28px; font-weight: 900; color: #00eaff; text-shadow: 0 0 12px #00eaff;">
        ➕ Add Tenant to Unit {{ unit.number }}
    </h1>

    <form method="POST" style="margin-top: 20px;">

        <label style="color:#00eaff; font-weight:800;">Full Name</label>
        <input type="text" name="name" required
               style="width:100%; padding:10px; border-radius:8px; margin-bottom:12px;
                      background:rgba(0,0,0,0.6); color:#00ff88; font-weight:700;">

        <label style="color:#ff00ff; font-weight:800;">Email</label>
        <input type="email" name="email" required
               style="width:100%; padding:10px; border-radius:8px; margin-bottom:12px;
                      background:rgba(0,0,0,0.6); color:#ffaa00; font-weight:700;">

        <label style="color:#ffdd00; font-weight:800;">Phone</label>
        <input type="text" name="phone" required
               style="width:100%; padding:10px; border-radius:8px; margin-bottom:12px;
                      background:rgba(0,0,0,0.6); color:#00eaff; font-weight:700;">

        <label style="color:#00ff88; font-weight:800;">National ID</label>
        <input type="text" name="id_number" required
               style="width:100%; padding:10px; border-radius:8px; margin-bottom:12px;
                      background:rgba(0,0,0,0.6); color:#ff00ff; font-weight:700;">

        <button type="submit"
                style="padding:12px 20px; background:linear-gradient(90deg,#00ff88,#00cc66);
                       color:black; font-weight:900; border-radius:10px; box-shadow:0 0 12px #00ff88;">
            ➕ Add Tenant
        </button>

    </form>

</div>
{% endblock %}
