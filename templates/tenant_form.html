{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 class="neon-heading-pink">
    New Tenant for <span class="neon-yellow">{{ unit.building.name }}</span> —
    <span class="neon-green">House {{ unit.number }}</span>
  </h2>
  <form method="post" class="form-vertical">
    <label class="neon-blue">Tenant Name
      <input name="name" required>
    </label>
    <label class="neon-purple">Phone
      <input name="phone">
    </label>
    <label class="neon-green">ID Number
      <input name="id_number">
    </label>
    <label class="neon-aqua">Email
      <input type="email" name="email">
    </label>
    <button class="btn">Save Tenant</button>
  </form>
  <a class="btn" href="{{ url_for('unit_detail', uid=unit.id) }}">⬅ Back</a>
</div>
{% endblock %}
