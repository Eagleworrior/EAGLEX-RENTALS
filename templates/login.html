{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2 class="neon-heading-pink">Landlord Login</h2>
  <form method="post" class="form-vertical">
    <label class="neon-blue">Email
      <input type="email" name="email" required>
    </label>
    <label class="neon-purple">Password
      <input type="password" name="password" required>
    </label>
    <button class="btn">Login</button>
  </form>
  <p class="neon-aqua">
    No account?
    <a href="{{ url_for('register') }}" class="neon-yellow">Register here</a>
  </p>
</div>
{% endblock %}
